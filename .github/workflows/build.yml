name: Scrape, build, and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:15 UTC: pull fresh data from federal sources, regenerate
    # the KB, build the site, deploy. Cache prevents repeated full pulls
    # when no source has changed.
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      run_scrapers:
        description: "Run scrapers before build"
        type: boolean
        default: true
      states:
        description: "States to scrape (space-separated, blank=all)"
        type: string
        default: ""

permissions:
  contents: write   # need write so the scraper can commit KB updates
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    # Run scrapers ONLY on the daily cron and on opt-in manual dispatch.
    # Pushes to main rebuild from the existing KB without re-scraping —
    # otherwise every code change would trigger a full ~60min source pull
    # and possibly create scrape-commit loops.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_scrapers)
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Salvation Army national pull alone is ~50 min
    outputs:
      kb_changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install Python deps
        run: pip install -r scrapers/requirements.txt

      - name: Run pipeline
        env:
          # Optional Google fallback. Pipeline runs without it.
          GOOGLE_GEOCODING_API_KEY: ${{ secrets.GOOGLE_GEOCODING_API_KEY }}
          NH_GEOCODE_BUDGET_USD: "50.0"
        run: |
          STATE_ARGS=""
          if [ -n "${{ inputs.states }}" ]; then
            STATE_ARGS="--states ${{ inputs.states }}"
          fi
          python -m scrapers.pipeline $STATE_ARGS

      - name: Commit KB updates
        id: commit
        run: |
          git config user.name  "neighbors-help-bot"
          git config user.email "bot@neighbors-help.org"
          git add kb/ scrapers/geocode/cache.json
          if git diff --cached --quiet; then
            echo "no KB changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            count=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "scraper update $(date -u +%Y-%m-%d): ${count} files"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "committed ${count} file changes"
          fi

  build:
    needs: [scrape]
    if: always() && (needs.scrape.result == 'success' || needs.scrape.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.151.2"
    steps:
      - uses: actions/checkout@v4
        with:
          # If the scrape job committed, we want the post-commit ref.
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install Python deps (for build_data)
        run: pip install -r scrapers/requirements.txt

      - name: Generate data files (index + per-state)
        # Always regenerate from KB so the site is consistent with KB even
        # when scraping was skipped (e.g. PR previews of layout changes).
        run: python -m scrapers.build_data

      - name: Install Hugo (extended)
        run: |
          wget -q -O hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb

      - name: Build site
        working-directory: site
        run: hugo --minify --gc

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
