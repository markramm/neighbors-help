{{ define "main" }}
{{ partial "topbar.html" (dict "variant" "page" "page" .) }}
<article class="prose">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ if eq .Section "r" }}
  <p style="color: var(--ink-mute);">

  {{ end }}
</article>
{{ end }}
