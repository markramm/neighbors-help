<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {{ partial "meta.html" . }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  {{ $needsMap := or .IsHome (eq .Section "r") (eq .Section "s") (eq .Section "z") }}
  {{ if $needsMap }}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous"/>
  {{ end }}

  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
</head>
<body>
  {{ block "main" . }}{{ end }}

  {{ if $needsMap }}
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
  {{ end }}

  {{ block "scripts" . }}{{ end }}
</body>
</html>
